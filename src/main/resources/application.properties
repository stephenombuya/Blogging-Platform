# ===================================
# Application Configuration
# ===================================
spring.application.name=blogging-platform
server.port=8080
server.servlet.context-path=/api

# ===================================
# Database Configuration
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/blog_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================================
# JPA / Hibernate
# ===================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false

# ===================================
# Flyway (Database Migrations)
# ===================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ===================================
# JWT Configuration
# ===================================
app.jwt.secret=YourSuperSecretJWTSigningKeyThatShouldBeAtLeast256BitsLongForHS256AlgorithmSecurity
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===================================
# Email Configuration
# ===================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@blogplatform.com
app.frontend.url=http://localhost:3000

# ===================================
# Pagination Defaults
# ===================================
app.pagination.default-page=0
app.pagination.default-size=10
app.pagination.max-size=100

# ===================================
# File Upload
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/
app.upload.allowed-types=image/jpeg,image/png,image/gif,image/webp

# ===================================
# Actuator
# ===================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Blogging Platform
info.app.version=1.0.0

# ===================================
# Logging
# ===================================
logging.level.com.blogplatform=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# ===================================
# Swagger / OpenAPI
# ===================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===================================
# Cache
# ===================================
spring.cache.type=simple
